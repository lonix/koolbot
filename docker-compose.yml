services:
  bot:
    image: ghcr.io/lonix/koolbot:latest
    container_name: koolbot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongodb
    stop_grace_period: 30s
    stop_signal: SIGTERM
    # Publish the bot's port 3000 so /health and (when WEBUI_ENABLED=true)
    # the admin Web UI at /admin/* are reachable from the host. This is the
    # simplest setup; it is NOT secured for the public internet.
    #
    # For internet-facing deployments use a reverse proxy (Caddy, nginx,
    # Traefik) and remove this publish — let the proxy forward to bot:3000
    # over the internal Docker network. See WEBUI.md → "Docker Compose
    # recipes" for a complete Caddy example.
    ports:
      - "3000:3000"

  mongodb:
    image: mongo:latest
    container_name: koolbot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    # MongoDB is NOT published to the host. The bot reaches it over the
    # internal Docker network at mongodb:27017. The default mongo image
    # ships with NO authentication, so exposing 27017 to the host (and
    # potentially the public internet) would mean an unauthenticated
    # database open to anyone who can reach the host.
    #
    # If you need host-side access for debugging, add a localhost-only
    # publish — never bind 0.0.0.0:
    #   ports:
    #     - "127.0.0.1:27017:27017"
    stop_grace_period: 30s
    stop_signal: SIGTERM

volumes:
  mongodb_data:
