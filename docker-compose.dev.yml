services:
  koolbot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: koolbot-dev
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    networks:
      - koolbot-network
    depends_on:
      - mongodb
    stop_grace_period: 30s
    stop_signal: SIGTERM
    # Publish port 3000 in dev so you can hit /health and the admin Web UI
    # (when WEBUI_ENABLED=true in .env) from your host browser at
    # http://localhost:3000. Set WEBUI_BASE_URL=http://localhost:3000.
    ports:
      - "3000:3000"

  mongodb:
    image: mongo:latest
    container_name: koolbot-mongodb-dev
    restart: unless-stopped
    volumes:
      - mongodb_data_dev:/data/db
    ports:
      - "27017:27017"
    networks:
      - koolbot-network
    stop_grace_period: 30s
    stop_signal: SIGTERM

volumes:
  mongodb_data_dev:

networks:
  koolbot-network:
    driver: bridge
