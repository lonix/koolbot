name: Docker Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Cancel in-progress runs for the same workflow and ref (except on tags)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # Required for uploading the hadolint SARIF report to the Security tab.
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true

      - name: Upload hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  build-and-push:
    name: Build, scan, sign and push
    runs-on: ubuntu-latest
    needs: hadolint
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing and SLSA provenance attestations.
      id-token: write
      attestations: write
      # Required for uploading the Trivy SARIF report to the Security tab.
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.1.0
        env:
          # Emit OCI annotations on both the per-platform manifests and the
          # image index. GHCR reads the package description from the index
          # annotation for multi-arch images, so "index" is required for the
          # description to show up on the GitHub Packages page.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=koolbot
            org.opencontainers.image.description=A Discord bot with various features
            maintainer=lonix
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          # metadata-action builds the annotations output from the
          # `annotations` input (not `labels`), so the custom description must
          # be repeated here to land in steps.meta.outputs.annotations — which
          # is what gets attached to the manifest index and read by GHCR.
          annotations: |
            org.opencontainers.image.title=koolbot
            org.opencontainers.image.description=A Discord bot with various features
            maintainer=lonix
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          # Always pull the latest node:24-alpine base layers instead of
          # reusing a cached digest. The Node team rebuilds the Alpine base
          # whenever Alpine ships security updates, so pulling fresh is how the
          # image absorbs patched system OpenSSL (libssl3/libcrypto3) — e.g. the
          # High PKCS7_verify use-after-free (#57/#72). Without this, the gha
          # build cache could reuse a stale base and a rebuild on main would
          # never pick up the fix.
          pull: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign published image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy
